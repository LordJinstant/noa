<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Users - Admin Portal | NOA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50">

<div class="site-wrapper">
  <div class="flex h-screen">

    <!-- Sidebar (same as dashboard) -->
    <div class="w-72 bg-white shadow-xl p-6 overflow-y-auto">
      <h1 class="text-3xl font-bold brand-green mb-10 flex items-center gap-3">
        <span>NOA Admin</span>
      </h1>
      
      <nav class="space-y-2">
        <a href="admin-portal.html" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>

        <a onclick="toggleTickets()" class="flex items-center justify-between px-4 py-3 hover:bg-gray-100 rounded-2xl cursor-pointer relative">
          <div class="flex items-center gap-3">
            <i class="fas fa-ticket-alt"></i> Tickets
          </div>
          <span id="ticketBadge" class="hidden bg-red-500 text-white text-xs font-bold px-2.5 py-0.5 rounded-full"></span>
        </a>

        <a href="manage-users.html" class="flex items-center gap-3 px-4 py-3 bg-gray-100 rounded-2xl">
          <i class="fas fa-users"></i> Manage Users
        </a>

        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-chart-bar"></i> Analytics
        </a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 hover:bg-gray-100 rounded-2xl">
          <i class="fas fa-newspaper"></i> Create Post
        </a>
      </nav>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-8 overflow-auto">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold">Manage Users</h2>
        <div class="relative">
          <input
            id="searchInput"
            type="text"
            placeholder="Search by name or email..."
            class="pl-10 pr-4 py-2 border border-gray-200 rounded-2xl w-72 focus:border-[#19A975] outline-none"
          />
          <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
        </div>
      </div>

      <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="p-5 text-left font-semibold">Name</th>
              <th class="p-5 text-left font-semibold">Email</th>
              <th class="p-5 text-left font-semibold">Role</th>
              <th class="p-5 text-left font-semibold">Grade</th>
              <th class="p-5 text-center font-semibold">Status</th>
              <th class="p-5 text-center font-semibold">Actions</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="admin-function.js"></script>
<script src="manage-users.js"></script>
</body>
</html>
